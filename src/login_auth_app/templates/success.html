<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bem Sucedido</title>
    <!-- Inclui Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define a fonte Inter para todo o corpo */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-r from-green-500 to-teal-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-6">Login Bem Sucedido!</h1>
        {% if username %}
            <p class="text-xl text-gray-700 mb-8">Bem-vindo, <span class="font-semibold text-blue-700">{{ username }}</span>!</p>
        {% else %}
            <p class="text-xl text-gray-700 mb-8">Você está logado!</p>
        {% endif %}
        <a href="{{ url_for('logout') }}"
           class="inline-block bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6
                  rounded-lg shadow-lg transition duration-300 ease-in-out transform hover:scale-105
                  focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
            Sair
        </a>
    </div>
</body>
</html>
