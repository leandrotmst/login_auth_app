<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Registro</title>
    <!-- Inclui Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define a fonte Inter para todo o corpo */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <h1 class="text-4xl font-extrabold text-center text-gray-900 mb-8">Bem-vindo!</h1>

        <!-- Exibe mensagens flash do Flask -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6">
                    {% for category, message in messages %}
                        <div class="p-3 rounded-lg text-sm text-white
                            {% if category == 'error' %} bg-red-500
                            {% elif category == 'success' %} bg-green-500
                            {% elif category == 'info' %} bg-blue-500
                            {% else %} bg-gray-500
                            {% endif %} mb-2">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="/" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Usuário:</label>
                <input type="text" id="username" name="username" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm
                              focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                       placeholder="Seu nome de usuário">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Senha:</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm
                              focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                       placeholder="Sua senha">
            </div>

            <div class="flex flex-col sm:flex-row justify-between space-y-4 sm:space-y-0 sm:space-x-4">
                <button type="submit" name="register_button"
                        class="w-full sm:w-1/2 flex justify-center py-3 px-4 border border-transparent
                               rounded-lg shadow-sm text-lg font-medium text-white bg-green-600
                               hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2
                               focus:ring-green-500 transform transition duration-300 hover:scale-105">
                    Registrar
                </button>
                <button type="submit" name="login_button"
                        class="w-full sm:w-1/2 flex justify-center py-3 px-4 border border-transparent
                               rounded-lg shadow-sm text-lg font-medium text-white bg-blue-600
                               hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2
                               focus:ring-blue-500 transform transition duration-300 hover:scale-105">
                    Entrar
                </button>
            </div>
        </form>
    </div>
</body>
</html>
